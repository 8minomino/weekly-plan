name: Weekly meal plan

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/weekly-meal-plan.yml"
      - "scripts/generate_week.py"
      - "scripts/generate_weeks.py"
  schedule:
    - cron: "17 9 * * 6"
      timezone: "Asia/Tokyo"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-meal-plan
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Generate meal plans
        run: python scripts/generate_weeks.py
      - name: Commit generated plan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js data/meal-plan.json
          git diff --cached --quiet && echo "No meal plan changes" && exit 0
          git commit -m "Update meal plans"
          git push

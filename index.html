<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7efe3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="献立">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>飯野家の夕食献立</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <div class="hero__label">IINO FAMILY DINNER</div>
    <h1>飯野家の夕食献立</h1>
    <p id="weekRange">読み込み中</p>
  </header>

  <main>
    <section class="summary" aria-label="基本方針">
      <div>
        <span>基本</span>
        <strong>ごはん + 味噌汁 + 野菜料理 + 主菜</strong>
      </div>
      <div>
        <span>一覧</span>
        <button class="outline-button" id="toggleWeek" type="button" aria-expanded="false">1週間分の献立を見る</button>
      </div>
      <div>
        <span>更新</span>
        <div class="update-actions">
          <button class="outline-button" id="nextWeek" type="button">翌週の献立に更新</button>
          <button class="secondary-button" id="currentWeek" type="button" hidden>現在の週に戻す</button>
        </div>
        <small class="update-note" id="updateNote"></small>
      </div>
    </section>

    <section class="week-panel" id="weekPanel" hidden>
      <div class="section-title">
        <span>WEEKLY MENU</span>
        <h2>1週間分の献立</h2>
      </div>
      <div class="week-table" id="weekTable"></div>
    </section>

    <nav class="day-tabs" id="dayTabs" aria-label="曜日選択"></nav>

    <section class="meal-card" id="mealCard" aria-live="polite"></section>

    <section class="shopping">
      <div class="section-title">
        <span>SHOPPING</span>
        <h2>買い物リスト</h2>
      </div>
      <div class="shopping__grid" id="shoppingList"></div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>

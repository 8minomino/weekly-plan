<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7efe3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="献立">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>飯野家の夕食献立</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <div class="hero__label">IINO FAMILY DINNER</div>
    <h1>飯野家の夕食献立</h1>
    <p id="weekRange">読み込み中</p>
  </header>

  <main>
    <section class="summary" aria-label="基本方針">
      <div>
        <span>基本</span>
        <strong>ごはん + 味噌汁 + 野菜料理 + 主菜</strong>
      </div>
      <div>
        <span>一覧</span>
        <button class="outline-button" id="toggleWeek" type="button" aria-expanded="false">1週間分の献立を見る</button>
      </div>
      <div>
        <span>週を選ぶ</span>
        <div class="week-actions" aria-label="表示する週を選択">
          <button class="secondary-button" id="prevWeek" type="button">前の週</button>
          <button class="secondary-button" id="currentWeek" type="button">今週</button>
          <button class="secondary-button" id="nextWeek" type="button">次の週</button>
        </div>
        <small class="update-note" id="updateNote"></small>
      </div>
    </section>

    <section class="week-panel" id="weekPanel" hidden>
      <div class="section-title">
        <span>WEEKLY MENU</span>
        <h2>1週間分の献立</h2>
      </div>
      <div class="week-table" id="weekTable"></div>
    </section>

    <section class="menu-section" id="menuSection" aria-labelledby="menuTitle">
      <div class="section-title section-title--compact">
        <span>DINNER</span>
        <h2 id="menuTitle">曜日別の献立</h2>
      </div>
      <nav class="day-tabs" id="dayTabs" role="tablist" aria-label="曜日選択"></nav>

      <section class="meal-card" id="mealCard" role="tabpanel" aria-live="polite"></section>
    </section>

    <section class="shopping" id="shoppingSection" aria-labelledby="shoppingTitle">
      <div class="section-title">
        <span>SHOPPING</span>
        <h2 id="shoppingTitle">買い物リスト</h2>
      </div>
      <div class="shopping__grid" id="shoppingList"></div>
    </section>
  </main>

  <nav class="quick-nav" aria-label="画面内ナビゲーション">
    <a href="#menuSection" data-section="menuSection" aria-current="true">献立</a>
    <a href="#shoppingSection" data-section="shoppingSection">買い物</a>
  </nav>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
